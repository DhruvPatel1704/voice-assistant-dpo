# CPU-only smoke test: no GPU, no vLLM server, no OpenAI key required.
# Runs a tiny model directly via the hf_transformers backend on both
# sides, wandb disabled. Judge uses the deterministic mock_conciseness
# provider so the full win-rate flow (position randomization,
# aggregation, results JSON) is exercised end to end without a real
# judge backend.
seed: 42
prompts_path: data/eval_prompts.jsonl
output_dir: eval/results

baseline:
  name: baseline
  backend: hf_transformers
  model: sshleifer/tiny-gpt2
  device: cpu

candidate:
  name: candidate
  backend: hf_transformers
  model: sshleifer/tiny-gpt2
  device: cpu

generation:
  max_tokens: 16
  temperature: 0.0

judge:
  provider: mock_conciseness
  model: gpt-4o-mini
  enabled: true

wandb:
  project: voice-assistant-eval
  mode: disabled
